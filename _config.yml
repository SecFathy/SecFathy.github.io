title: Mohammed Fathy
description: Security Engineer — notes on offensive security, threat intel, and incident response.
author: Mohammed Fathy
email: secfathy@gmail.com
baseurl: ""
url: "https://secfathy.github.io"

# Custom theme (whiteglass / blog.orange.tw style). No gem theme.
plugins:
  - jekyll-feed
  - jekyll-seo-tag

show_excerpts: true

# Pretty, orange.tw-style permalinks: /posts/2026-05-title/
permalink: /posts/:year-:month-:title/

nav:
  - title: Articles
    url: /
  - title: About
    url: /about/

social:
  github: SecFathy

# utterances comments (GitHub Issues). No IDs needed.
# Just install the app: https://github.com/apps/utterances -> pick this repo.
# Set enabled: false to hide comments site-wide.
utterances:
  enabled: true
  repo: "SecFathy/SecFathy.github.io"
  issue_term: "pathname"
  label: "comment"
  theme: "preferred-color-scheme"

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
