title: Mohammed Fathy
description: Security Engineer — notes on offensive security, threat intel, and incident response.
author: Mohammed Fathy
email: secfathy@gmail.com
baseurl: ""
url: "https://secfathy.github.io"

# Custom theme (whiteglass / blog.orange.tw style). No gem theme.
plugins:
  - jekyll-feed
  - jekyll-seo-tag

show_excerpts: true

# Pretty, orange.tw-style permalinks: /posts/2026-05-title/
permalink: /posts/:year-:month-:title/

nav:
  - title: Articles
    url: /
  - title: About
    url: /about/

social:
  github: SecFathy

# Giscus comments (GitHub Discussions). Fill repo_id + category_id from https://giscus.app
# Set enabled: false to hide comments site-wide.
giscus:
  enabled: true
  repo: "SecFathy/SecFathy.github.io"
  repo_id: "R_kgDOQABGaA"
  category: "Announcements"
  category_id: "DIC_kwDOQABGaA4Cabcd"
  mapping: "pathname"
  reactions_enabled: "1"
  theme: "preferred_color_scheme"
  lang: "en"

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
