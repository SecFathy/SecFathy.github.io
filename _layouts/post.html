---
layout: default
---

<article class="post h-entry">
  <header class="post-header">
    <h1 class="p-name post-title">{{ page.title | escape }}</h1>
    <div class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {%- if page.tags and page.tags.size > 0 -%}
      <span class="tags">
        {%- for tag in page.tags -%}<span class="tag">#{{ tag }}</span>{%- endfor -%}
      </span>
      {%- endif -%}
    </div>
    <hr>
  </header>

  <div class="post-content e-content">
    {{ content }}
  </div>

  <hr>
  <p class="post-nav"><a href="{{ "/" | relative_url }}">&larr; All articles</a></p>

  {%- include comments.html -%}
</article>
