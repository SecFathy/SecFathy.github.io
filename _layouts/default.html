<!DOCTYPE html>
<html lang="{{ site.lang | default: "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {%- feed_meta -%}
  {%- seo -%}
</head>
<body class="mx-auto">
  <header id="header">
    <a id="brand" href="{{ "/" | relative_url }}"><h1>{{ site.title }}</h1></a>
    <p class="tagline">{{ site.description }}</p>
    <nav>
      {%- for item in site.nav -%}
      <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {%- endfor -%}
      <a href="https://github.com/{{ site.social.github }}">GitHub</a>
      <a href="{{ "/feed.xml" | relative_url }}">Feed</a>
    </nav>
    <hr>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer id="footer">
    <hr>
    <p>© {{ site.author }} — Security Engineer.
       <a href="https://github.com/{{ site.social.github }}">github.com/{{ site.social.github }}</a>
    </p>
  </footer>
</body>
</html>
